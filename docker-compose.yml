services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"   # Redis protocol
      - "3000:3000"   # FalkorDB Browser UI
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  falkordb_data:
